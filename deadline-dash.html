<!DOCTYPE html>
<html lang="en">
<head>

<title>Mr Clarke's Art Film Deadline Dash</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    display: block;

  .lb-rank { width: 30px; color: #5b7ff5; }

    display: inline-block;

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<body>

<div id="game-wrapper">
  <div id="game-header">
    <h1>MR CLARKE'S ART FILM DEADLINE DASH</h1>
    <div id="score-display">HI 00000  00000</div>
  </div>

  <canvas id="game-canvas" width="800" height="200"></canvas>

  <div id="footer-row">
    <span id="controls-hint">SPACE / ↑ TO JUMP — ↓ TO DUCK</span>
    <button id="toggle-leaderboard">LEADERBOARD</button>
  </div>

  <div id="leaderboard-panel">
    <h2>— LEADERBOARD —</h2>
    <ol id="leaderboard-list"></ol>
  </div>

  <div id="name-input-overlay">
    <p>NEW HIGH SCORE!<br><span id="overlay-score"></span></p>
    <input type="text" id="player-name" maxlength="10" placeholder="YOUR NAME">
    <button id="submit-name">SAVE</button>
  </div>
</div>

<script>
// ===== CANVAS SETUP =====
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 200;
const GROUND_Y = 170;
const COL = '#c0c0d4';
const COL_LIGHT = '#5a5a72';

// ===== GAME STATE =====
let gameState = 'idle'; // idle | running | dead
let score = 0;
let highScore = parseInt(localStorage.getItem('dd_highscore') || '0');
let frameCount = 0;
let baseSpeed = 5;
let gameSpeed = 5;
let lastObstacleX = W;

// ===== PLAYER =====
const player = {
  x: 60,
  y: GROUND_Y,
  w: 28,
  h: 40,
  vy: 0,
  jumping: false,
  ducking: false,
  runFrame: 0,
  runTimer: 0,
  grounded: true
};

const GRAVITY = 0.55;
const JUMP_FORCE = -10.5;
const DUCK_H = 24;

// ===== OBSTACLES =====
let obstacles = [];

// Ground obstacles — must jump over
const GROUND_OBSTACLES = [
  { name: 'tripod',        w: 22, h: 38, draw: drawTripod },
  { name: 'assignment',    w: 24, h: 26, draw: drawAssignment },
  { name: 'laptop',        w: 30, h: 22, draw: drawLaptop },
  { name: 'coffees',       w: 16, h: 28, draw: drawCoffee },
  { name: 'clapperboard',  w: 26, h: 30, draw: drawClapperboard },
  { name: 'textbook',      w: 20, h: 32, draw: drawTextbookStack },
];

// Aerial obstacles — must duck under
const AERIAL_OBSTACLES = [
  { name: 'boom_mic',      w: 50, h: 14, draw: drawBoomMic },
  { name: 'flying_papers', w: 36, h: 16, draw: drawFlyingPapers },
  { name: 'drone',         w: 32, h: 18, draw: drawDrone },
];

// ===== CLOUDS & GROUND DETAILS =====
let clouds = [];
let groundOffset = 0;
let groundBumps = [];

function initGroundBumps() {
  groundBumps = [];
  for (let i = 0; i < 30; i++) {
    groundBumps.push({
      x: Math.random() * W,
      type: Math.random() < 0.5 ? 'dot' : 'dash'
    });
  }
}

function initClouds() {
  clouds = [];
  for (let i = 0; i < 4; i++) {
    clouds.push({
      x: 150 + Math.random() * 700,
      y: 20 + Math.random() * 50,
      w: 40 + Math.random() * 30,
      speed: 0.3 + Math.random() * 0.4
    });
  }
}

// ===== PIXEL DRAWING HELPERS =====
function px(x, y, s = 2) {
  ctx.fillRect(Math.round(x), Math.round(y), s, s);
}

function pxRect(x, y, w, h) {
  ctx.fillRect(Math.round(x), Math.round(y), w, h);
}

// ===== DRAW PLAYER =====
function drawPlayer() {
  const bx = player.x;
  const by = player.ducking
    ? GROUND_Y - DUCK_H
    : player.y - player.h;

  ctx.fillStyle = COL;

  if (player.ducking) {
    // Ducking pose — wider, shorter
    // Head
    pxRect(bx+4, by, 12, 8);
    // Eye
    ctx.fillStyle = '#0a0a0f';
    pxRect(bx+12, by+2, 2, 2);
    ctx.fillStyle = COL;
    // Body (wider, low)
    pxRect(bx, by+8, 22, 8);
    // Legs (shuffling)
    const legOff = player.runFrame === 0 ? 0 : 4;
    pxRect(bx+4+legOff, by+16, 4, 6);
    pxRect(bx+14-legOff, by+16, 4, 6);
    // Backpack bump
    pxRect(bx, by+2, 4, 6);
  } else {
    // Head
    pxRect(bx+6, by, 14, 12);
    // Eye
    ctx.fillStyle = '#0a0a0f';
    pxRect(bx+16, by+4, 2, 3);
    ctx.fillStyle = COL;
    // Hair / cap
    pxRect(bx+6, by-2, 14, 3);
    pxRect(bx+18, by-2, 4, 2);
    // Body
    pxRect(bx+4, by+12, 16, 12);
    // Backpack
    pxRect(bx, by+10, 6, 12);
    // Arms
    if (gameState === 'running') {
      const armOff = player.runFrame === 0 ? -2 : 2;
      pxRect(bx+18, by+14+armOff, 4, 8);
      pxRect(bx+2, by+22-armOff, 4, 4);
    } else {
      pxRect(bx+18, by+14, 4, 8);
    }
    // Legs (animated run)
    if (gameState === 'running' && player.grounded) {
      if (player.runFrame === 0) {
        pxRect(bx+6, by+24, 4, 10);
        pxRect(bx+14, by+24, 4, 8);
        pxRect(bx+6, by+34, 6, 3);
        pxRect(bx+14, by+32, 6, 3);
      } else {
        pxRect(bx+6, by+24, 4, 8);
        pxRect(bx+14, by+24, 4, 10);
        pxRect(bx+6, by+32, 6, 3);
        pxRect(bx+14, by+34, 6, 3);
      }
    } else {
      // Standing / jumping
      pxRect(bx+6, by+24, 4, 10);
      pxRect(bx+14, by+24, 4, 10);
      pxRect(bx+6, by+34, 6, 3);
      pxRect(bx+14, by+34, 6, 3);
    }
  }
}

// ===== DRAW GROUND OBSTACLES =====
function drawTripod(x, y, w, h) {
  ctx.fillStyle = COL;
  pxRect(x+w/2-1, y, 2, h);
  // Camera head
  pxRect(x+4, y, w-8, 10);
  pxRect(x+2, y+2, 2, 6);
  // Lens dot
  ctx.fillStyle = COL_LIGHT;
  pxRect(x+w-6, y+3, 3, 3);
  ctx.fillStyle = COL;
  // Left leg
  pxRect(x, y+h-2, 2, 4);
  pxRect(x+2, y+h-8, 2, 8);
  pxRect(x+4, y+h-14, 2, 8);
  // Right leg
  pxRect(x+w-2, y+h-2, 2, 4);
  pxRect(x+w-4, y+h-8, 2, 8);
  pxRect(x+w-6, y+h-14, 2, 8);
  // Base bar
  pxRect(x, y+h-2, w, 2);
}

function drawAssignment(x, y, w, h) {
  ctx.fillStyle = COL;
  // Stack of papers
  pxRect(x+2, y+2, w-2, h-2);
  pxRect(x, y, w-2, h-2);
  // Lines on paper
  ctx.fillStyle = COL_LIGHT;
  for (let i = 0; i < 4; i++) {
    pxRect(x+4, y+5+i*5, w-10, 1);
  }
  ctx.fillStyle = COL;
  // "F" grade or deadline stamp
  pxRect(x+w-10, y+3, 6, 8);
  ctx.fillStyle = '#0a0a0f';
  pxRect(x+w-9, y+4, 1, 6);
  pxRect(x+w-9, y+4, 3, 1);
  pxRect(x+w-9, y+7, 2, 1);
}

function drawLaptop(x, y, w, h) {
  ctx.fillStyle = COL;
  // Screen
  pxRect(x+2, y, w-4, h-6);
  ctx.fillStyle = COL_LIGHT;
  pxRect(x+4, y+2, w-8, h-10);
  ctx.fillStyle = COL;
  // Base
  pxRect(x, y+h-6, w, 4);
  pxRect(x+2, y+h-2, w-4, 2);
}

function drawCoffee(x, y, w, h) {
  ctx.fillStyle = COL;
  // Cup body
  pxRect(x+2, y+6, w-4, h-6);
  // Rim
  pxRect(x, y+4, w, 4);
  // Handle
  pxRect(x+w-2, y+10, 4, 8);
  pxRect(x+w-2, y+18, 4, 2);
  pxRect(x+w, y+10, 2, 2);
  // Steam
  ctx.fillStyle = COL_LIGHT;
  pxRect(x+4, y, 2, 4);
  pxRect(x+8, y-2, 2, 4);
}

function drawClapperboard(x, y, w, h) {
  ctx.fillStyle = COL;
  // Board body
  pxRect(x, y+8, w, h-8);
  // Clapper top
  pxRect(x, y, w, 10);
  // Stripes
  ctx.fillStyle = '#0a0a0f';
  pxRect(x+4, y+1, 4, 8);
  pxRect(x+12, y+1, 4, 8);
  pxRect(x+20, y+1, 4, 8);
  ctx.fillStyle = COL;
  // Text lines
  ctx.fillStyle = COL_LIGHT;
  pxRect(x+3, y+14, w-6, 1);
  pxRect(x+3, y+18, w-6, 1);
  pxRect(x+3, y+22, w-8, 1);
}

function drawTextbookStack(x, y, w, h) {
  ctx.fillStyle = COL;
  // Bottom book
  pxRect(x, y+h-10, w, 10);
  // Middle book
  pxRect(x+2, y+h-20, w-2, 10);
  ctx.fillStyle = COL_LIGHT;
  pxRect(x+4, y+h-18, w-8, 1);
  ctx.fillStyle = COL;
  // Top book
  pxRect(x+1, y, w-2, 12);
  // Spine lines
  ctx.fillStyle = COL_LIGHT;
  pxRect(x+1, y+h-9, 1, 8);
  pxRect(x+1, y+1, 1, 10);
}

// ===== DRAW AERIAL OBSTACLES =====
function drawBoomMic(x, y, w, h) {
  ctx.fillStyle = COL;
  // Long pole
  pxRect(x, y+6, w, 3);
  // Mic head (fuzzy windscreen) at the end
  pxRect(x+w-14, y, 14, h);
  // Fuzzy texture on windscreen
  ctx.fillStyle = COL_LIGHT;
  pxRect(x+w-12, y+2, 2, 2);
  pxRect(x+w-8, y+4, 2, 2);
  pxRect(x+w-5, y+1, 2, 2);
  pxRect(x+w-10, y+h-4, 2, 2);
  pxRect(x+w-4, y+h-3, 2, 2);
  ctx.fillStyle = COL;
  // Grip / mount at back
  pxRect(x, y+4, 6, 6);
  // Small angle indicator line
  pxRect(x+6, y+8, 4, 2);
}

function drawFlyingPapers(x, y, w, h) {
  ctx.fillStyle = COL;
  // Paper 1 — slightly tilted
  pxRect(x, y+4, 14, 12);
  ctx.fillStyle = '#0a0a0f';
  pxRect(x+2, y+7, 8, 1);
  pxRect(x+2, y+10, 6, 1);
  pxRect(x+2, y+13, 9, 1);
  ctx.fillStyle = COL;
  // Paper 2 — overlapping, offset
  pxRect(x+12, y, 14, 12);
  ctx.fillStyle = '#0a0a0f';
  pxRect(x+14, y+3, 8, 1);
  pxRect(x+14, y+6, 6, 1);
  pxRect(x+14, y+9, 9, 1);
  ctx.fillStyle = COL;
  // Paper 3 — trailing
  pxRect(x+22, y+6, 12, 10);
  ctx.fillStyle = '#0a0a0f';
  pxRect(x+24, y+9, 7, 1);
  pxRect(x+24, y+12, 5, 1);
  ctx.fillStyle = COL;
  // Motion lines
  ctx.fillStyle = COL_LIGHT;
  pxRect(x-6, y+7, 4, 1);
  pxRect(x-8, y+11, 6, 1);
  pxRect(x-4, y+14, 3, 1);
}

function drawDrone(x, y, w, h) {
  ctx.fillStyle = COL;
  // Central body
  pxRect(x+10, y+6, 12, 8);
  // Camera lens underneath
  ctx.fillStyle = COL_LIGHT;
  pxRect(x+14, y+12, 4, 4);
  ctx.fillStyle = COL;
  pxRect(x+15, y+13, 2, 2);
  // Arms extending out
  pxRect(x+4, y+8, 8, 2);
  pxRect(x+20, y+8, 8, 2);
  // Propellers (spinning — frame alternation)
  const spin = Math.floor(frameCount / 3) % 2;
  if (spin === 0) {
    pxRect(x, y, 10, 2);
    pxRect(x+22, y, 10, 2);
  } else {
    pxRect(x+2, y+1, 6, 2);
    pxRect(x+24, y+1, 6, 2);
  }
  // Rotor hubs
  pxRect(x+4, y+2, 2, 6);
  pxRect(x+26, y+2, 2, 6);
  // Landing skids
  pxRect(x+8, y+h-2, 6, 2);
  pxRect(x+18, y+h-2, 6, 2);
}

// ===== DRAW CLOUD =====
function drawCloud(cx, cy, w) {
  ctx.fillStyle = COL_LIGHT;
  pxRect(cx, cy, w, 6);
  pxRect(cx+4, cy-4, w-8, 4);
  pxRect(cx+w*0.3, cy-6, w*0.4, 2);
}

// ===== DRAW GROUND =====
function drawGround() {
  ctx.fillStyle = COL;
  pxRect(0, GROUND_Y+2, W, 1);

  // Ground texture bumps
  ctx.fillStyle = COL_LIGHT;
  for (const b of groundBumps) {
    const bx = ((b.x - groundOffset) % (W + 40) + W + 40) % (W + 40) - 20;
    if (b.type === 'dot') {
      pxRect(bx, GROUND_Y + 6 + Math.sin(b.x)*3, 2, 2);
    } else {
      pxRect(bx, GROUND_Y + 8 + Math.cos(b.x)*2, 4, 1);
    }
  }

  // Small ground line details
  ctx.fillStyle = '#ccc';
  for (let i = 0; i < 8; i++) {
    const gx = ((i * 110 + 20 - groundOffset * 0.5) % (W + 60) + W + 60) % (W + 60) - 30;
    pxRect(gx, GROUND_Y + 4, 6 + (i % 3) * 4, 1);
  }
}

// ===== SPAWN OBSTACLE =====
function spawnObstacle() {
  // Minimum gap decreases with speed
  const minGap = Math.max(200, 350 - (gameSpeed - baseSpeed) * 12);
  const gap = minGap + Math.random() * 180;

  // Decide: aerial or ground?
  // Aerial obstacles start appearing after score 150, increasing probability
  const aerialChance = score > 150 ? Math.min(0.35, (score - 150) / 800) : 0;
  const isAerial = Math.random() < aerialChance;

  if (isAerial) {
    const type = AERIAL_OBSTACLES[Math.floor(Math.random() * AERIAL_OBSTACLES.length)];
    // Aerial obstacles hover at a height the player must duck under
    // Player standing top = GROUND_Y - player.h = 130
    // Player ducking top = GROUND_Y - DUCK_H = 146
    // So aerial obstacle bottom must be above ducking height but overlap standing height
    const aerialY = GROUND_Y - player.h - 4; // top of standing player area, with a little buffer

    obstacles.push({
      x: lastObstacleX + gap,
      y: aerialY,
      w: type.w,
      h: type.h,
      draw: type.draw,
      name: type.name,
      aerial: true
    });
    lastObstacleX = obstacles[obstacles.length - 1].x;
  } else {
    const type = GROUND_OBSTACLES[Math.floor(Math.random() * GROUND_OBSTACLES.length)];

    // Occasionally spawn a double at higher speeds
    const count = (gameSpeed > 7 && Math.random() < 0.25) ? 2 : 1;

    for (let i = 0; i < count; i++) {
      const t = (i === 1)
        ? GROUND_OBSTACLES[Math.floor(Math.random() * GROUND_OBSTACLES.length)]
        : type;
      obstacles.push({
        x: lastObstacleX + gap + i * (t.w + 12),
        y: GROUND_Y + 2 - t.h,
        w: t.w,
        h: t.h,
        draw: t.draw,
        name: t.name,
        aerial: false
      });
      lastObstacleX = obstacles[obstacles.length - 1].x;
    }
  }
}

// ===== COLLISION =====
function checkCollision() {
  const ph = player.ducking ? DUCK_H : player.h;
  const py = player.ducking ? GROUND_Y - DUCK_H : player.y - player.h;
  const px0 = player.x + 6;
  const px1 = player.x + player.w - 4;
  const py0 = py + 4;
  const py1 = py + ph - 2;

  for (const ob of obstacles) {
    const ox0 = ob.x + 2;
    const ox1 = ob.x + ob.w - 2;
    const oy0 = ob.y + 2;
    const oy1 = ob.y + ob.h;

    if (px1 > ox0 && px0 < ox1 && py1 > oy0 && py0 < oy1) {
      return true;
    }
  }
  return false;
}

// ===== SCORE =====
function formatScore(s) {
  return String(Math.floor(s)).padStart(5, '0');
}

function updateScoreDisplay() {
  document.getElementById('score-display').textContent =
    `HI ${formatScore(highScore)}  ${formatScore(score)}`;
}

// ===== FIREBASE SETUP =====
const firebaseConfig = {
  apiKey: "AIzaSyAaT53CmsG_vvGNpfxpohHb-PAzBtilSIA",
  authDomain: "mpa-revision-hub.firebaseapp.com",
  databaseURL: "https://mpa-revision-hub-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mpa-revision-hub",
  storageBucket: "mpa-revision-hub.firebasestorage.app",
  messagingSenderId: "553153973507",
  appId: "1:553153973507:web:f3435416ae688f38b2ed36"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const lbRef = db.ref('leaderboard');

// Local cache of leaderboard
let leaderboardCache = [];

// ===== LEADERBOARD =====
// Listen for real-time updates
lbRef.orderByChild('score').limitToLast(10).on('value', (snapshot) => {
  const entries = [];
  snapshot.forEach((child) => {
    entries.push(child.val());
  });
  // Sort descending (Firebase limitToLast gives ascending)
  entries.sort((a, b) => b.score - a.score);
  leaderboardCache = entries;
  renderLeaderboard();
});

function addToLeaderboard(name, finalScore) {
  const entry = {
    name: name.toUpperCase(),
    score: Math.floor(finalScore),
    timestamp: Date.now()
  };
  lbRef.push(entry).then(() => {
    // Clean up: keep only top 10
    lbRef.orderByChild('score').once('value', (snapshot) => {
      const all = [];
      snapshot.forEach((child) => {
        all.push({ key: child.key, score: child.val().score });
      });
      all.sort((a, b) => a.score - b.score);
      // Remove entries beyond top 10
      while (all.length > 10) {
        const toRemove = all.shift();
        lbRef.child(toRemove.key).remove();
      }
    });
  });
}

function isLeaderboardWorthy(s) {
  if (leaderboardCache.length < 10) return true;
  return Math.floor(s) > leaderboardCache[leaderboardCache.length - 1].score;
}

function renderLeaderboard() {
  const lb = leaderboardCache;
  const list = document.getElementById('leaderboard-list');
  if (lb.length === 0) {
    list.innerHTML = '<li style="justify-content:center;color:#7a7a94;">No scores yet \u2014 get running!</li>';
    return;
  }
  list.innerHTML = lb.map((entry, i) =>
    `<li><span class="lb-rank">${i + 1}.</span><span class="lb-name">${entry.name}</span><span class="lb-score">${formatScore(entry.score)}</span></li>`
  ).join('');
}

// ===== GAME OVER SCREEN =====
function drawGameOver() {
  ctx.fillStyle = COL;
  ctx.font = '16px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('G A M E   O V E R', W / 2, 70);

  // Restart icon
  ctx.strokeStyle = COL;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(W / 2, 110, 12, 0, Math.PI * 1.6);
  ctx.stroke();
  // Arrow head
  const ax = W / 2 + 10, ay = 100;
  ctx.beginPath();
  ctx.moveTo(ax - 4, ay - 2);
  ctx.lineTo(ax + 2, ay + 4);
  ctx.lineTo(ax - 2, ay + 6);
  ctx.fill();
}

// ===== IDLE / START SCREEN =====
function drawIdleScreen() {
  drawPlayer();
  drawGround();

  ctx.fillStyle = COL;
  ctx.font = '10px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('PRESS SPACE OR TAP TO START', W / 2, 80);

  ctx.fillStyle = COL_LIGHT;
  ctx.font = '8px "Press Start 2P"';
  ctx.fillText('Jump over obstacles — duck under boom mics!', W / 2, 100);
}

// ===== MAIN LOOP =====
function reset() {
  player.y = GROUND_Y;
  player.vy = 0;
  player.jumping = false;
  player.ducking = false;
  player.grounded = true;
  player.runFrame = 0;
  obstacles = [];
  score = 0;
  frameCount = 0;
  gameSpeed = baseSpeed;
  lastObstacleX = W;
  groundOffset = 0;
  initClouds();
  initGroundBumps();
}

function update() {
  if (gameState !== 'running') return;

  frameCount++;

  // Ramp difficulty
  gameSpeed = baseSpeed + Math.floor(score / 100) * 0.3;
  if (gameSpeed > 14) gameSpeed = 14;

  // Player physics
  if (!player.grounded) {
    player.vy += GRAVITY;
    player.y += player.vy;
    if (player.y >= GROUND_Y) {
      player.y = GROUND_Y;
      player.vy = 0;
      player.jumping = false;
      player.grounded = true;
    }
  }

  // Run animation
  player.runTimer++;
  if (player.runTimer > 6) {
    player.runFrame = 1 - player.runFrame;
    player.runTimer = 0;
  }

  // Move obstacles
  for (const ob of obstacles) {
    ob.x -= gameSpeed;
  }
  obstacles = obstacles.filter(o => o.x + o.w > -60);

  // Spawn — check if there's enough room for a new obstacle
  const rightmost = obstacles.length > 0 ? Math.max(...obstacles.map(o => o.x + o.w)) : 0;
  if (rightmost < W - 100) {
    spawnObstacle();
  }

  // Clouds
  for (const c of clouds) {
    c.x -= c.speed;
    if (c.x + c.w < 0) {
      c.x = W + Math.random() * 100;
      c.y = 15 + Math.random() * 55;
    }
  }

  // Ground scroll
  groundOffset += gameSpeed;

  // Score
  score += gameSpeed * 0.1;

  // Collision
  if (checkCollision()) {
    gameState = 'dead';
    if (score > highScore) {
      highScore = Math.floor(score);
      localStorage.setItem('dd_highscore', String(highScore));
    }
    updateScoreDisplay();

    // Check leaderboard
    if (isLeaderboardWorthy(score)) {
      setTimeout(() => {
        document.getElementById('overlay-score').textContent = formatScore(score);
        document.getElementById('name-input-overlay').classList.add('visible');
        document.getElementById('player-name').value = '';
        document.getElementById('player-name').focus();
      }, 400);
    }
  }

  updateScoreDisplay();
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  if (gameState === 'idle') {
    drawIdleScreen();
    return;
  }

  // Clouds
  for (const c of clouds) {
    drawCloud(c.x, c.y, c.w);
  }

  // Ground
  drawGround();

  // Obstacles
  for (const ob of obstacles) {
    ob.draw(ob.x, ob.y, ob.w, ob.h);
  }

  // Player
  drawPlayer();

  // Score milestone flash
  if (gameState === 'running' && Math.floor(score) % 100 < 2 && score > 10) {
    ctx.fillStyle = 'rgba(91,127,245,0.06)';
    ctx.fillRect(0, 0, W, H);
  }

  if (gameState === 'dead') {
    drawGameOver();
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ===== INPUT =====
function jump() {
  if (gameState === 'idle') {
    gameState = 'running';
    reset();
    return;
  }
  if (gameState === 'dead') {
    if (document.getElementById('name-input-overlay').classList.contains('visible')) return;
    gameState = 'running';
    reset();
    return;
  }
  if (player.grounded && !player.jumping) {
    player.vy = JUMP_FORCE;
    player.grounded = false;
    player.jumping = true;
  }
}

function duckStart() {
  if (gameState === 'running') {
    player.ducking = true;
    // Fast fall if in air
    if (!player.grounded) {
      player.vy += 4;
    }
  }
}

function duckEnd() {
  player.ducking = false;
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    jump();
  }
  if (e.code === 'ArrowDown') {
    e.preventDefault();
    duckStart();
  }
});

document.addEventListener('keyup', (e) => {
  if (e.code === 'ArrowDown') {
    duckEnd();
  }
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const ty = touch.clientY - rect.top;
  if (ty > rect.height * 0.6) {
    duckStart();
  } else {
    jump();
  }
});

canvas.addEventListener('touchend', (e) => {
  duckEnd();
});

canvas.addEventListener('click', (e) => {
  jump();
});

// Name input
document.getElementById('submit-name').addEventListener('click', () => {
  const name = document.getElementById('player-name').value.trim();
  if (name) {
    addToLeaderboard(name, score);
    document.getElementById('name-input-overlay').classList.remove('visible');
    document.getElementById('leaderboard-panel').classList.add('visible');
  }
});

document.getElementById('player-name').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('submit-name').click();
  }
  e.stopPropagation();
});

// Leaderboard toggle
document.getElementById('toggle-leaderboard').addEventListener('click', () => {
  const panel = document.getElementById('leaderboard-panel');
  panel.classList.toggle('visible');
  renderLeaderboard();
});

// ===== INIT =====
reset();
initClouds();
initGroundBumps();
updateScoreDisplay();
// Leaderboard renders automatically via Firebase listener
gameLoop();
</script>
</body>
</html>
